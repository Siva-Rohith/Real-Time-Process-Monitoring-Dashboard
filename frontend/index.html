<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTOS Kernel Administrator | Sentinel Pro LIVE</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { background-color: #0d1117; color: #c9d1d9; }
    </style>
</head>

<body>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><span class="text-primary">RTOS</span> Kernel Sentinel</h2>
        <div id="connection-status" class="badge bg-danger p-2">OFFLINE</div>
    </div>
<div class="row">
        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h6>Global Free Heap</h6>
                <h3 id="total-heap">---</h3>
                <div class="progress mt-2"><div id="heap-bar" class="progress-bar bg-success" style="width: 0%"></div></div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h6>Global CPU Load</h6>
                <h3 id="cpu-load-text" class="text-info">0%</h3>
                <div class="progress mt-2"><div id="cpu-bar" class="progress-bar bg-info progress-bar-striped progress-bar-animated" style="width: 0%"></div></div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h6>System Uptime</h6>
                <h3 id="uptime">00:00:00</h3>
                <small class="text-muted">Kernel Heartbeat</small>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card p-3">
                <h5>Administrative Process Control</h5>
                <div class="table-responsive">
                    <table class="table table-dark table-hover mt-2">
                        <thead>
                            <tr class="text-muted">
                                <th>PID</th>
                                <th>Process Name</th>
                                <th>Status</th>
                                <th style="width: 25%;">CPU Usage</th>
                                <th>Memory</th>
                                <th class="text-center">Management Actions</th>
                            </tr>
                        </thead>
                        <tbody id="process-table-body">
                            <tr><td colspan="6" class="text-center py-5">Connecting to 10.223.211.239...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
